name: Daily Stock Data Update

on:
  schedule:
    # Τρέχει κάθε μέρα στις 07:00 UTC (= 08:00 ή 09:00 ώρα Ελλάδας/Γερμανίας ανάλογα με θερινή ώρα)
    - cron: "0 7 * * *"
  workflow_dispatch:  # επιτρέπει manual τρέξιμο από το GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install finviz yfinance

      - name: Run fetch script
        run: python public/fetch_data.py
        working-directory: .

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "Auto-update stock data $(date -u +%Y-%m-%d)"
          git push
